server:
  port: ${PORT:8081}

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/griddog}
    username: ${DB_USER:griddog}
    password: ${DB_PASSWORD:griddog}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  application:
    name: java-service

logging:
  level:
    root: INFO
    com.griddog: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
