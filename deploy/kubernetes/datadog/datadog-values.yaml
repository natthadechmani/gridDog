datadog:
  site: "datadoghq.com"
  clusterName: "griddog-eks"
  apiKeyExistingSecret: "datadog-secret"
  clusterChecks:
    enabled: true
  orchestratorExplorer:
    enabled: true
  apm:
    instrumentation:
      enabled: true
      targets:
        - name: "default-target"
          ddTraceConfigs:
            - name: "DD_PROFILING_ENABLED"
              value: "auto"
  logs:
    enabled: true
    containerCollectAll: true
  networkMonitoring:
    enabled: true
  processAgent:
    processCollection: true

agents:
  tolerations:
    - operator: Exists