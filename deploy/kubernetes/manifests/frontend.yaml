# Frontend (Next.js) — Deployment + Service.
# Uses relative URLs (no NEXT_PUBLIC_BACKEND_URL needed) — same image
# works in any environment, browser supplies the page origin.
---
apiVersion: v1
kind: Service
metadata:
  name: sg-k8s-frontend
  namespace: griddog
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  selector:
    app.kubernetes.io/name: frontend
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sg-k8s-frontend
  namespace: griddog
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/part-of: griddog
        region: singapore
        env: dev
    spec:
      nodeSelector:
        griddog.io/role: frontend
      containers:
        - name: frontend
          image: 369042512949.dkr.ecr.ap-southeast-1.amazonaws.com/griddog/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /, port: 3000 }
            initialDelaySeconds: 30
            periodSeconds: 30
