# Express service (Node.js) — Deployment + Service.
# 2 replicas spread across both backend nodes (anti-affinity).
---
apiVersion: v1
kind: Service
metadata:
  name: sg-k8s-express-service
  namespace: griddog
  labels:
    app.kubernetes.io/name: express-service
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  selector:
    app.kubernetes.io/name: express-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sg-k8s-express-service
  namespace: griddog
  labels:
    app.kubernetes.io/name: express-service
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: express-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: express-service
        app.kubernetes.io/part-of: griddog
        region: singapore
        env: dev
    spec:
      nodeSelector:
        griddog.io/role: backend
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: express-service
              topologyKey: kubernetes.io/hostname
      containers:
        - name: express-service
          image: 369042512949.dkr.ecr.ap-southeast-1.amazonaws.com/griddog/express-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: MONGODB_URI
              value: mongodb://sg-k8s-mongodb:27017/griddog
          resources:
            requests: { cpu: "50m", memory: "128Mi" }
            limits:   { cpu: "500m", memory: "256Mi" }
          readinessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 3001 }
            initialDelaySeconds: 30
            periodSeconds: 30
