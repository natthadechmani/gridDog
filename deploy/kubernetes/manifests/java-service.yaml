# Java service (Spring Boot) — Deployment + Service.
# 2 replicas spread across both backend nodes (anti-affinity).
---
apiVersion: v1
kind: Service
metadata:
  name: sg-k8s-java-service
  namespace: griddog
  labels:
    app.kubernetes.io/name: java-service
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  selector:
    app.kubernetes.io/name: java-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sg-k8s-java-service
  namespace: griddog
  labels:
    app.kubernetes.io/name: java-service
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: java-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: java-service
        app.kubernetes.io/part-of: griddog
        region: singapore
        env: dev
    spec:
      nodeSelector:
        griddog.io/role: backend
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: java-service
              topologyKey: kubernetes.io/hostname
      containers:
        - name: java-service
          image: 369042512949.dkr.ecr.ap-southeast-1.amazonaws.com/griddog/java-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          env:
            - name: PORT
              value: "8081"
            - name: DATABASE_URL
              value: jdbc:postgresql://sg-k8s-postgres:5432/griddog
            - name: DB_USER
              value: griddog
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: griddog-secrets
                  key: db_password
          resources:
            requests: { cpu: "200m", memory: "512Mi" }
            limits:   { cpu: "1000m", memory: "768Mi" }
          readinessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /actuator/health, port: 8081 }
            initialDelaySeconds: 60
            periodSeconds: 30
