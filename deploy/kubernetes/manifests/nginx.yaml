# nginx reverse proxy — Deployment + Service + ConfigMap + Ingress.
# The Ingress is what triggers the AWS Load Balancer Controller to
# provision the public ALB. The ALB forwards everything to the nginx
# Service; nginx.conf does the path routing inside the pod.
#
# IMPORTANT: edit `inbound-cidrs` below when your IP changes. The two
# values are: <your-ip>/32 (admin browser) + <NAT-EIP>/32 (Puppeteer).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: sg-k8s-nginx-conf
  namespace: griddog
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
data:
  nginx.conf: |
    events {}

    http {
        upstream frontend {
            server sg-k8s-frontend:3000;
        }

        upstream backend {
            server sg-k8s-backend:8080;
        }

        server {
            listen 80;

            location /nginx-health {
                return 200 "ok\n";
                add_header Content-Type text/plain;
            }

            location /health {
                proxy_pass http://backend;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }

            location /api/ {
                proxy_pass http://backend;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_read_timeout 60s;
            }

            location / {
                proxy_pass http://frontend;
                proxy_set_header Host            $host;
                proxy_set_header X-Real-IP       $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            }
        }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: sg-k8s-nginx
  namespace: griddog
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  selector:
    app.kubernetes.io/name: nginx
  ports:
    - name: http
      port: 80
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sg-k8s-nginx
  namespace: griddog
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
        app.kubernetes.io/part-of: griddog
        region: singapore
        env: dev
    spec:
      nodeSelector:
        griddog.io/role: frontend
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - name: http
              containerPort: 80
          volumeMounts:
            - name: conf
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
              readOnly: true
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits:   { cpu: "200m", memory: "128Mi" }
          readinessProbe:
            httpGet: { path: /nginx-health, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /nginx-health, port: 80 }
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: conf
          configMap:
            name: sg-k8s-nginx-conf
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sg-k8s-nginx
  namespace: griddog
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: griddog
    region: singapore
    env: dev
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /nginx-health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    # Admin IP /32 + shared NAT EIP /32 (for Puppeteer egress through NAT).
    # Edit when your home IP changes (curl ifconfig.me).
    alb.ingress.kubernetes.io/inbound-cidrs: "42.61.131.119/32,3.1.4.47/32"
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: sg-k8s-nginx
                port:
                  number: 80
