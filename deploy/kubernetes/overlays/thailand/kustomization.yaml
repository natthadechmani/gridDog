apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Thailand overlay: ap-southeast-7 (ap-southeast-7a)
# Cost-saving configuration: all Deployments scaled to 1 replica.

bases:
  - ../../base

namePrefix: th-

commonLabels:
  region: ap-southeast-7
  az: ap-southeast-7a

# Scale all Deployments down to 1 replica for cost savings in this region.
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: backend
        namespace: griddog
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: java-service
        namespace: griddog
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: express-service
        namespace: griddog
      spec:
        replicas: 1
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: frontend
        namespace: griddog
      spec:
        replicas: 1

# Override REGION to reflect the Thailand AWS region.
configMapGenerator:
  - name: griddog-config
    namespace: griddog
    behavior: merge
    literals:
      - REGION=ap-southeast-7
