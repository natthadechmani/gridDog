# frontend.yaml
#
# Service type is set to LoadBalancer for easy external access in sandbox.
# For production or cost-sensitive environments:
#   - Change type to NodePort and set a nodePort value (30000-32767), OR
#   - Remove the LoadBalancer service entirely and use an Ingress controller
#     (e.g., nginx-ingress or AWS ALB Ingress Controller) pointing to ClusterIP.
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: griddog
  labels:
    app: griddog
    component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: griddog
      component: frontend
  template:
    metadata:
      labels:
        app: griddog
        component: frontend
    spec:
      containers:
        - name: frontend
          image: griddog/frontend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            # Set this to the public-facing URL of the backend service.
            # In a real deployment replace the placeholder with the actual URL,
            # or manage it via an overlay ConfigMapGenerator in each environment.
            - name: NEXT_PUBLIC_BACKEND_URL
              value: "http://REPLACE_WITH_BACKEND_URL"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
# Service: LoadBalancer exposes the frontend externally on port 80.
# Change type to NodePort or replace with an Ingress resource as needed.
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: griddog
  labels:
    app: griddog
    component: frontend
spec:
  type: LoadBalancer
  selector:
    app: griddog
    component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
