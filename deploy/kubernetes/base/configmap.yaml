apiVersion: v1
kind: ConfigMap
metadata:
  name: griddog-config
  namespace: griddog
  labels:
    app: griddog
data:
  JAVA_SERVICE_URL: "http://java-service:8081"
  EXPRESS_SERVICE_URL: "http://express-service:3001"
  DATABASE_URL: "postgres://griddog:griddog@postgres:5432/griddog?sslmode=disable"
  JAVA_DATABASE_URL: "jdbc:postgresql://postgres:5432/griddog"
  DB_USER: "griddog"
  DB_PASSWORD: "griddog"
  # NOTE: In real production environments, DB_PASSWORD should be stored in a Kubernetes
  # Secret (type: Opaque) and referenced via secretKeyRef, not a ConfigMap.
  # This ConfigMap approach is acceptable for sandbox/local development only.
  REGION: "local"
