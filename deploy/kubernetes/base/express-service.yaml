apiVersion: apps/v1
kind: Deployment
metadata:
  name: express-service
  namespace: griddog
  labels:
    app: griddog
    component: express-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: griddog
      component: express-service
  template:
    metadata:
      labels:
        app: griddog
        component: express-service
    spec:
      containers:
        - name: express-service
          image: griddog/express-service:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          env:
            - name: PORT
              value: "3001"
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: express-service
  namespace: griddog
  labels:
    app: griddog
    component: express-service
spec:
  type: ClusterIP
  selector:
    app: griddog
    component: express-service
  ports:
    - name: http
      port: 3001
      targetPort: 3001
      protocol: TCP
