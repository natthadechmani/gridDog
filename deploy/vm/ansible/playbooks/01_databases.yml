---
- name: Deploy databases (PostgreSQL + MongoDB)
  hosts: databases
  become: true

  tasks:
    - name: Clone griddog repo
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ repo_dir }}"
        version: "{{ repo_branch }}"
        force: true

    - name: Create data directories for EBS volumes
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /data/postgres
        - /data/mongodb
        - /opt/griddog-compose

    - name: Create postgres log directory
      ansible.builtin.file:
        path: /var/log/postgresql
        state: directory
        mode: "0777"

    - name: Template docker-compose file
      ansible.builtin.template:
        src: ../templates/docker-compose.databases.yml.j2
        dest: /opt/griddog-compose/docker-compose.yml
        mode: "0644"

    - name: Start database containers
      community.docker.docker_compose_v2:
        project_src: /opt/griddog-compose
        build: never
        state: present
        pull: always

    - name: Wait for PostgreSQL to be ready
      ansible.builtin.command:
        cmd: docker exec griddog-postgres pg_isready -U griddog -d griddog
      register: pg_ready
      retries: 15
      delay: 5
      until: pg_ready.rc == 0

    - name: Wait for MongoDB to be ready
      ansible.builtin.command:
        cmd: docker exec griddog-mongodb mongosh --eval "db.adminCommand('ping')"
      register: mongo_ready
      retries: 15
      delay: 5
      until: mongo_ready.rc == 0

    - name: Create datadog PostgreSQL user
      ansible.builtin.command:
        cmd: >
          docker exec griddog-postgres psql -U griddog -d griddog -c
          "DO $$ BEGIN
            IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = 'datadog') THEN
              CREATE USER datadog WITH PASSWORD '{{ dd_postgres_password }}';
            END IF;
          END $$;
          GRANT pg_monitor TO datadog;
          GRANT SELECT ON pg_stat_database TO datadog;"
      changed_when: false

    - name: Create datadog MongoDB user
      ansible.builtin.command:
        cmd: >
          docker exec griddog-mongodb mongosh admin --eval
          "try { db.createUser({ user: 'datadog', pwd: '{{ dd_mongo_password }}', roles: [
            { role: 'read', db: 'admin' },
            { role: 'clusterMonitor', db: 'admin' },
            { role: 'read', db: 'local' },
            { role: 'readAnyDatabase', db: 'admin' }
          ] }) } catch(e) { if (e.code !== 51003) throw e }"
      changed_when: false
