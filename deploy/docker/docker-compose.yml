# version field removed (obsolete in Compose v2)

networks:
  griddog:
    driver: bridge

volumes:
  postgres_data:

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    container_name: griddog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: griddog
      POSTGRES_USER: griddog
      POSTGRES_PASSWORD: griddog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U griddog -d griddog"]
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 20s
      start_interval: 10s
    networks:
      - griddog
    labels:
      com.griddog.service: postgres
      com.griddog.region: local

  # ---------------------------------------------------------------------------
  # Backend – Golang
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: griddog/backend:latest
    container_name: griddog-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      JAVA_SERVICE_URL: http://java-service:8081
      EXPRESS_SERVICE_URL: http://express-service:3001
      DATABASE_URL: postgres://griddog:griddog@postgres:5432/griddog?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 10s
    networks:
      - griddog
    labels:
      com.griddog.service: backend
      com.griddog.region: local
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  # ---------------------------------------------------------------------------
  # Java Service – Spring Boot
  # ---------------------------------------------------------------------------
  java-service:
    build:
      context: ../../java-service
      dockerfile: Dockerfile
    image: griddog/java-service:latest
    container_name: griddog-java-service
    restart: unless-stopped
    environment:
      PORT: "8081"
      DATABASE_URL: jdbc:postgresql://postgres:5432/griddog
      DB_USER: griddog
      DB_PASSWORD: griddog
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 10s
    networks:
      - griddog
    labels:
      com.griddog.service: java-service
      com.griddog.region: local
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768m

  # ---------------------------------------------------------------------------
  # Express Service – Node.js / Express.js
  # ---------------------------------------------------------------------------
  express-service:
    build:
      context: ../../express-service
      dockerfile: Dockerfile
    image: griddog/express-service:latest
    container_name: griddog-express-service
    restart: unless-stopped
    environment:
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 10s
    networks:
      - griddog
    labels:
      com.griddog.service: express-service
      com.griddog.region: local
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # ---------------------------------------------------------------------------
  # Frontend – Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost             # local dev — change to EC2 public IP/DNS on server
    image: griddog/frontend:latest
    container_name: griddog-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost               # local dev — change to EC2 public IP/DNS on server
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 20s
      start_interval: 10s
    networks:
      - griddog
    labels:
      com.griddog.service: frontend
      com.griddog.region: local
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # ---------------------------------------------------------------------------
  # nginx – reverse proxy (port 80 entry point)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: griddog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - griddog
    labels:
      com.griddog.service: nginx
      com.griddog.region: local
