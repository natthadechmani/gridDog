# version field removed (obsolete in Compose v2)

networks:
  griddog:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:

services:

  # ---------------------------------------------------------------------------
  # Datadog Agent
  # ---------------------------------------------------------------------------
  datadog-agent:
    image: registry.datadoghq.com/agent:latest
    profiles: ["observability"]
    environment:
      # API Configuration
      - DD_API_KEY=${DD_API_KEY}
      - DD_HOSTNAME=${DD_HOSTNAME}
      # Global Environment — matches DD_ENV on all app services
      - DD_ENV=qa
      # Container Log Collection
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      # Exclude the agent's own logs to avoid self-monitoring noise
      - DD_CONTAINER_EXCLUDE_LOGS=name:datadog-agent
      # Container Metrics Collection
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_CONTAINER_LABELS_AS_TAGS={"my.custom.label.team":"team"}
      # APM Configuration — required for distributed tracing across all services.
      # DD_APM_NON_LOCAL_TRAFFIC allows the agent to accept traces from other
      # containers on the same Docker network (not just localhost).
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_APM_ENABLED=true
      # DogStatsD — required for runtime metrics (DD_RUNTIME_METRICS_ENABLED on app services)
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      # USM (Universal Service Monitoring) — future use, requires kernel probes.
      # Uncomment these + cap_add + security_opt + volume mounts below to enable.
      # - DD_SYSTEM_PROBE_NETWORK_ENABLED=true
      # - DD_SYSTEM_PROBE_SERVICE_MONITORING_ENABLED=true
      - DD_TAGS=group:gridDog
      # HOST_ROOT=/host/root identifies the volume mount path for the host's filesystem root. This corresponds to - /:/host/root:ro in the volumes block. This is required for USM.
      # - HOST_ROOT='/host/root'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      # Kernel debug filesystem — required for USM/eBPF system probes (future use)
      # - /sys/kernel/debug:/sys/kernel/debug
      # Host root filesystem — required for USM (future use)
      # - /:/host/root:ro
      # - /etc/passwd:/etc/passwd:ro
      # - /etc/group:/etc/group:ro
      # - /etc/os-release:/etc/os-release
    # cap_add and security_opt give the Agent container heightened privileges for kernel-level monitoring. This is required for USM and CNM.
    # cap_add:
      # - SYS_ADMIN
      # - SYS_RESOURCE
      # - SYS_PTRACE
      #  - NET_ADMIN
      # - NET_BROADCAST
      # - NET_RAW
      # - IPC_LOCK
      # - CHOWN
    # security_opt:
      # - apparmor:unconfined
    # id: "host"
    labels:
      # Datadog autodiscovery for log collection and container metrics
      com.datadoghq.ad.logs: '[{"source": "docker", "service": "datadog-agent", "env": "qa", "version": "griddog-1.0"}]'
      # com.datadoghq.ad.tags: '["service:datadog-agent", "env:qa", "version:griddog-1.0"]'
    networks:
      - griddog

  # ---------------------------------------------------------------------------
  # PostgreSQL 15
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:15
    profiles: ["default"]
    container_name: griddog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: griddog
      POSTGRES_USER: griddog
      POSTGRES_PASSWORD: griddog
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./../../database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U griddog -d griddog"]
      interval: 5m
      timeout: 5s
      retries: 5
      start_period: 20s
      start_interval: 10s
    networks:
      - griddog
    labels:
      com.datadoghq.ad.check_names: '["postgres"]'
      com.datadoghq.ad.init_configs: '[{}]'
      com.datadoghq.ad.instances: '[{"host":"%%host%%", "port":5432, "username":"griddog", "password":"griddog"}]'
      com.datadoghq.tags.version: '13'
      com.datadoghq.ad.logs: '[{"source": "postgresql"}]'
      com.datadoghq.tags.service: 'postgres'

  # ---------------------------------------------------------------------------
  # Backend – Golang
  # Tracer: Orchestrion (compile-time source rewriting — no code changes needed).
  # orchestrion go build rewrites the source at build time to inject spans.
  # The binary already contains the tracer; only env vars are needed at runtime.
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    image: griddog/backend:latest
    profiles: ["default"]
    container_name: griddog-backend
    restart: unless-stopped
    environment:
      PORT: "8080"
      JAVA_SERVICE_URL: http://java-service:8081
      EXPRESS_SERVICE_URL: http://express-service:3001
      TRAFFIC_SERVICE_URL: http://traffic:3002
      DOTNET_SCHEDULER_URL: http://dotnet-scheduler:5000
      DATABASE_URL: postgres://griddog:griddog@postgres:5432/griddog?sslmode=disable
      # --- Datadog unified service tagging ---
      DD_SERVICE: golang-backend
      DD_VERSION: 1.0.0
      DD_ENV: qa
      # DD_AGENT_HOST tells the tracer where to send spans.
      # Must match the agent service name on the same Docker network.
      DD_AGENT_HOST: datadog-agent
      # DD_LOGS_INJECTION injects dd.trace_id + dd.span_id into every log line
      # so Datadog can link a log entry to its parent trace in APM.
      DD_LOGS_INJECTION: "true"
      # Runtime metrics: goroutine count, GC pause, heap allocation, etc.
      DD_RUNTIME_METRICS_ENABLED: "true"
      # Continuous profiler: CPU, heap, goroutine profiles visible in DD Profiler.
      DD_PROFILING_ENABLED: "true"
      # 100% head-based sampling — every request produces a complete trace.
      # Lower this (e.g. 0.1) to reduce volume in high-traffic environments.
      DD_TRACE_SAMPLING_RULES: '[{"service": "golang-backend", "sample_rate": 1.0}]'
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 10s
    networks:
      - griddog
    labels:
      my.custom.label.team: 'golang-backend-team'
      com.datadoghq.ad.logs: '[{"source": "go"}]'
      # Unified service tagging labels — agent reads these to tag metrics + logs.
      com.datadoghq.tags.service: 'golang-backend'
      com.datadoghq.tags.env: 'qa'
      com.datadoghq.tags.version: '1.0.0'
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  # ---------------------------------------------------------------------------
  # Java Service – Spring Boot
  # Tracer: dd-java-agent.jar attached via -javaagent JVM flag (in Dockerfile).
  # Uses the JVM Instrumentation API to rewrite bytecode at class-load time.
  # No application code changes needed — the agent intercepts HTTP, JDBC, etc.
  # ---------------------------------------------------------------------------
  java-service:
    build:
      context: ../../java-service
      dockerfile: Dockerfile
    image: griddog/java-service:latest
    profiles: ["default"]
    container_name: griddog-java-service
    restart: unless-stopped
    environment:
      PORT: "8081"
      DATABASE_URL: jdbc:postgresql://postgres:5432/griddog
      DB_USER: griddog
      DB_PASSWORD: griddog
      # --- Datadog unified service tagging ---
      # DD_AGENT_HOST is critical — without it the tracer defaults to localhost:8126
      # which can't reach the agent container on the Docker network.
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: java-service
      DD_VERSION: 1.0.0
      DD_ENV: qa
      # Injects trace/span IDs into Logback JSON output for log-trace correlation.
      DD_LOGS_INJECTION: "true"
      # JVM runtime metrics: thread count, GC duration, heap usage.
      DD_RUNTIME_METRICS_ENABLED: "true"
      # Continuous profiler: CPU, allocation, wall time profiles in DD Profiler.
      DD_PROFILING_ENABLED: "true"
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 30s
      start_interval: 10s
    networks:
      - griddog
    labels:
      my.custom.label.team: 'java-backend-team'
      com.datadoghq.ad.logs: '[{"source": "java"}]'
      # Unified service tagging labels
      com.datadoghq.tags.service: 'java-service'
      com.datadoghq.tags.env: 'qa'
      com.datadoghq.tags.version: '1.0.0'
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 768m

  # ---------------------------------------------------------------------------
  # MongoDB 7
  # ---------------------------------------------------------------------------
  mongodb:
    image: mongo:7
    profiles: ["default"]
    container_name: griddog-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 20s
      start_interval: 10s
    networks:
      - griddog
    labels:
      com.datadoghq.ad.logs: '[{"source": "mongodb"}]'

  # ---------------------------------------------------------------------------
  # Express Service – Node.js / Express.js
  # Tracer: dd-trace npm package loaded via NODE_OPTIONS="--require dd-trace/init".
  # Uses monkey-patching — wraps Node.js require() at startup to intercept Express,
  # http, MongoDB calls and emit spans. No application code changes needed.
  # NODE_OPTIONS is set in the Dockerfile so the tracer loads before any app code.
  # ---------------------------------------------------------------------------
  express-service:
    build:
      context: ../../express-service
      dockerfile: Dockerfile
    image: griddog/express-service:latest
    profiles: ["default"]
    container_name: griddog-express-service
    restart: unless-stopped
    environment:
      PORT: "3001"
      MONGODB_URI: mongodb://mongodb:27017/griddog
      # --- Datadog unified service tagging ---
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: express-service
      DD_VERSION: 1.0.0
      DD_ENV: qa
      # Injects trace/span IDs into Winston JSON logs for log-trace correlation.
      DD_LOGS_INJECTION: "true"
      # Node.js runtime metrics: event loop lag, GC duration, heap usage.
      DD_RUNTIME_METRICS_ENABLED: "true"
      # Continuous profiler: CPU, heap, event loop wall time profiles.
      DD_PROFILING_ENABLED: "true"
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 10s
      start_interval: 10s
    networks:
      - griddog
    labels:
      my.custom.label.team: 'express-team'
      com.datadoghq.ad.logs: '[{"source": "nodejs"}]'
      # Unified service tagging labels
      com.datadoghq.tags.service: 'express-service'
      com.datadoghq.tags.env: 'qa'
      com.datadoghq.tags.version: '1.0.0'
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # ---------------------------------------------------------------------------
  # .NET Scheduler – ASP.NET Core 8
  # Tracer: Datadog CLR Profiler API (native C++ .so library).
  # Unlike Java (-javaagent) or Node (--require), .NET uses the CLR Profiling API —
  # a native interface requiring a .so shared library installed inside the container.
  # The CORECLR_* env vars and LD_PRELOAD are baked into the Dockerfile as ENV
  # instructions because they point to paths inside the image (not runtime config).
  #
  # To ENABLE the tracer:  CORECLR_ENABLE_PROFILING=1 must be set (Dockerfile ENV).
  # To ENABLE profiling:   DD_PROFILING_ENABLED=true (set here in docker-compose).
  # To DISABLE tracing:    set CORECLR_ENABLE_PROFILING=0 as an override here.
  # ---------------------------------------------------------------------------
  dotnet-scheduler:
    build:
      context: ../../dotnet-scheduler
      dockerfile: Dockerfile
    image: griddog/dotnet-scheduler:latest
    profiles: ["default"]
    container_name: griddog-dotnet-scheduler
    restart: unless-stopped
    environment:
      PORT: "5000"
      # Npgsql connection string format (different from Go and JDBC formats)
      DATABASE_URL: "Host=postgres;Port=5432;Database=griddog;Username=griddog;Password=griddog"
      # --- Datadog unified service tagging ---
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: dotnet-scheduler
      DD_VERSION: 1.0.0
      DD_ENV: qa
      # Injects trace/span IDs into Microsoft.Extensions.Logging JSON output.
      DD_LOGS_INJECTION: "true"
      # .NET runtime metrics: GC collections, thread pool queue, exception counts.
      DD_RUNTIME_METRICS_ENABLED: "true"
      # Continuous profiler: CPU time, wall time, exceptions, allocations.
      # Requires LD_PRELOAD to be set in the Dockerfile (already done).
      # LD_PRELOAD loads Datadog.Linux.ApiWrapper.x64.so which wraps Linux
      # syscalls to enable accurate CPU/wall time sampling on Linux.
      DD_PROFILING_ENABLED: "true"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 20s
      start_interval: 10s
    networks:
      - griddog
    labels:
      my.custom.label.team: 'dotnet-team'
      com.datadoghq.ad.logs: '[{"source": "dotnet"}]'
      # Unified service tagging labels
      com.datadoghq.tags.service: 'dotnet-scheduler'
      com.datadoghq.tags.env: 'qa'
      com.datadoghq.tags.version: '1.0.0'
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m

  # ---------------------------------------------------------------------------
  # Frontend – Next.js
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: http://localhost             # local dev — change to EC2 public IP/DNS on server
    image: griddog/frontend:latest
    profiles: ["default"]
    container_name: griddog-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_BACKEND_URL: http://localhost               # local dev — change to EC2 public IP/DNS on server
      # --- Datadog unified service tagging ---
      DD_AGENT_HOST: datadog-agent
      DD_SERVICE: frontend-service
      DD_VERSION: 1.0.0
      DD_ENV: qa
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 20s
      start_interval: 10s
    networks:
      - griddog
    labels:
      my.custom.label.team: 'frontend-team'
      com.datadoghq.ad.logs: '[{"source": "nodejs"}]'
      # Unified service tagging labels
      com.datadoghq.tags.service: 'frontend-service'
      com.datadoghq.tags.env: 'qa'
      com.datadoghq.tags.version: '1.0.0'
      # https://docs.datadoghq.com/containers/docker/log/?tab=containerinstallation#examples
      # https://docs.datadoghq.com/logs/log_collection/nodejs/?tab=winston30
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

  # ---------------------------------------------------------------------------
  # nginx – reverse proxy (port 80 entry point)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    profiles: ["default"]
    container_name: griddog-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 80 || exit 1"]
      interval: 5m
      timeout: 5s
      retries: 3
      start_period: 5s
      start_interval: 5s
    networks:
      - griddog
    labels:
      my.custom.label.team: 'infra-team'
      com.datadoghq.tags.service: 'nginx'
      com.datadoghq.tags.version: '1.0.0'
      com.datadoghq.ad.logs: '[{"source": "nginx"}]'

  # ---------------------------------------------------------------------------
  # Traffic Generator – Puppeteer (profile: traffic)
  # Start: docker compose --profile default --profile traffic up
  # ---------------------------------------------------------------------------
  traffic:
    build:
      context: ../../traffic
      dockerfile: Dockerfile
    image: griddog/traffic:latest
    profiles: ["traffic"]
    container_name: griddog-traffic
    restart: unless-stopped
    environment:
      TRAFFIC_BASE_URL: http://nginx
    depends_on:
      nginx:
        condition: service_started
    networks:
      - griddog
